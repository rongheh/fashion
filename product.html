<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <div class="logo"><a href="index.html">RONG</a></div>
  <div>
    <a href="index.html">HOME</a>
    <a href="checkout.html">CART <span id="cartCount" class="cart-count">0</span></a>
  </div>
</nav>

<div class="container">
  <div class="product">
    <img id="productImg">

    <div>
      <h1 id="name"></h1>
      <h2 id="price"></h2>
      <p>Refined streetwear piece blending traditional Chinese inspiration with modern silhouettes.</p>

      <button onclick="add()">Add to Cart</button>
    </div>
  </div>
</div>

<footer>© 2026 RONG</footer>

<script src="script.js"></script>
<script>
const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const price = params.get("price");
const img = params.get("img");

const images = {
  1: "https://images.unsplash.com/photo-1520975916090-3105956dac38",
  2: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c",
  3: "https://images.unsplash.com/photo-1523381210434-271e8be1f52b",
  4: "https://images.unsplash.com/photo-1544441893-675973e31985"
};

document.getElementById("name").innerText = name;
document.getElementById("price").innerText = "$" + price;
document.getElementById("productImg").src = images[img];

function add() {
  addToCart(name, Number(price));
}
</script>

</body>
</html>
